apiVersion: v1
kind: ConfigMap
metadata:
  name: ardupilot-config
data:
  DISPLAY: ":0"
  XAUTHORITY: "/run/user/1000/xauth_FkJMoe"
  XDG_RUNTIME_DIR: "/run/user/1000"
  TZ: "America/Sao_Paulo"
---
apiVersion: v1
kind: Pod
metadata:
  name: ardupilot
  labels:
    app: ardupilot.pod
    
spec:
  hostNetwork: true
  containers:
  - name: main
    image: localhost/ardupilot-sitl:latest
    args: ["/ardupilot/Tools/autotest/sim_vehicle.py", "-v", "ArduCopter", "-f", "gazebo-iris", "--model", "JSON", "--console"]
    tty: true
    ports:
    - containerPort: 5760
      protocol: TCP
    - containerPort: 5762
      protocol: TCP
    - containerPort: 5763
      protocol: TCP
    - containerPort: 9005
      protocol: UDP
    resources:
      limits:
        amd.com/gpu: 1
    securityContext:
      allowPrivilegeEscalation: true
      seLinuxOptions:
        type: spc_t
    envFrom:
    - configMapRef:
        name: ardupilot-config
    volumeMounts:
    - name: xauthority
      mountPath: /run/user/1000/xauth_FkJMoe:Z
      readOnly: true
    - name: gpu-device
      mountPath: /dev/dri
    - name: kfd-device
      mountPath: /dev/kfd

  volumes:
  - name: xauthority
    hostPath:
      path: /run/user/1000/xauth_FkJMoe
      type: File
  - name: gpu-device
    hostPath:
      path: /dev/dri
      type: Directory
  - name: kfd-device
    hostPath:
      path: /dev/kfd
      type: Directory
