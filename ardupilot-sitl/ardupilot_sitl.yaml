apiVersion: v1
kind: ConfigMap
metadata:
  name: ardupilot-config
data:
  DISPLAY: ":0"
  XAUTHORITY: "${XAUTHORITY}"
  XDG_RUNTIME_DIR: "/run/user/${USER_UID}"
  TZ: "America/Sao_Paulo"
---
apiVersion: v1
kind: Pod
metadata:
  name: ardupilot
  labels:
    app: ardupilot.pod
    
spec:
  hostNetwork: true
  containers:
  - name: main
    image: ghcr.io/falcon-ifsp/drone-sim/ardupilot-sitl:latest
    args: ["/ardupilot/Tools/autotest/sim_vehicle.py", "-v", "ArduCopter", "--console", "--no-rebuild"]
    tty: true
    ports:
    - containerPort: 5760
      protocol: TCP
    - containerPort: 5762
      protocol: TCP
    - containerPort: 5763
      protocol: TCP
    - containerPort: 9005
      protocol: UDP
    securityContext:
      seLinuxOptions:
        type: spc_t
    envFrom:
    - configMapRef:
        name: ardupilot-config
    volumeMounts:
    - name: xauthority
      mountPath: "${XAUTHORITY}:Z"
      readOnly: true

  volumes:
  - name: xauthority
    hostPath:
      path: "${XAUTHORITY}"
      type: File
