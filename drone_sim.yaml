apiVersion: v1
kind: ConfigMap
metadata:
  name: drone-sim-config
data:
  DISPLAY: ":0"
  XAUTHORITY: "/run/user/1000/xauth_FkJMoe"
  XDG_RUNTIME_DIR: "/run/user/1000"
  GZ_IP: "127.0.0.1"
  TZ: "America/Sao_Paulo"
---
apiVersion: v1
kind: Pod
metadata:
  name: drone-sim
  labels:
    app: drone-sim.pod

spec:
  hostNetwork: true
  containers:
  - name: gazebo-harmonic
    image: localhost/gazebo-harmonic-amd:latest
    args: ["/usr/bin/gz", "sim", "-v4", "-r", "iris_runway.sdf"]
    ports:
    - containerPort: 5600
    resources:
      limits:
        amd.com/gpu: 1
    securityContext:
      allowPrivilegeEscalation: true
      seLinuxOptions:
        type: spc_t
    envFrom:
    - configMapRef:
        name: drone-sim-config
    volumeMounts:
    - name: xauthority
      mountPath: /run/user/1000/xauth_FkJMoe:Z
      readOnly: true
    - name: gpu-device
      mountPath: /dev/dri

  - name: ardupilot-sitl
    image: localhost/ardupilot-sitl:latest
    args: ["/ardupilot/Tools/autotest/sim_vehicle.py", "-v", "ArduCopter", "-f", "gazebo-iris", "--model", "JSON", "--console"]
    tty: true
    ports:
    - containerPort: 5760
    resources:
      limits:
        amd.com/gpu: 1
    securityContext:
      seLinuxOptions:
        type: spc_t
    envFrom:
    - configMapRef:
        name: drone-sim-config
    volumeMounts:
    - name: xauthority
      mountPath: /run/user/1000/xauth_FkJMoe:Z
      readOnly: true
    - name: gpu-device
      mountPath: /dev/dri

  volumes:
  - name: xauthority
    hostPath:
      path: /run/user/1000/xauth_FkJMoe
      type: File
  - name: gpu-device
    hostPath:
      path: /dev/dri
      type: Directory
